  <!-- Document lines -->
  <g stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.4">
    <line x1="44" y1="44" x2="80" y2="44"/>
    <line x1="44" y1="54" x2="74" y2="54"/>
    <line x1="44" y1="84" x2="80" y2="84"/>
    <line x1="44" y1="94" x2="70" y2="94"/>
    <line x1="44" y1="104" x2="76" y2="104"/>
  </g>
  <!-- Code angle brackets < /> -->
  <g fill="none" stroke="white" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
    <!-- < bracket -->
    <polyline points="46,60 34,72 46,84"/>
    <!-- > bracket -->
