<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#047857"/>
      <stop offset="100%" stop-color="#064e3b"/>
    </linearGradient>
    <linearGradient id="bg-sheen" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#064e3b" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="scroll-grad" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#d1fae5" stop-opacity="0.75"/>
    </linearGradient>
    <linearGradient id="bracket-glow" x1="0.5" y1="1" x2="0.5" y2="0">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#6ee7b7" stop-opacity="0.9"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="magic-glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="128" height="128" rx="28" fill="url(#bg)"/>
  <rect width="128" height="128" rx="28" fill="url(#bg-sheen)"/>

  <!-- Subtle binary/code dots in background -->
  <g fill="#ffffff" opacity="0.04">
    <circle cx="20" cy="20" r="1.5"/>
    <circle cx="28" cy="20" r="1.5"/>
    <circle cx="36" cy="20" r="1.5"/>
    <circle cx="20" cy="28" r="1.5"/>
    <circle cx="36" cy="28" r="1.5"/>
    <circle cx="92" cy="20" r="1.5"/>
    <circle cx="100" cy="20" r="1.5"/>
    <circle cx="108" cy="20" r="1.5"/>
    <circle cx="92" cy="28" r="1.5"/>
    <circle cx="108" cy="28" r="1.5"/>
    <circle cx="20" cy="100" r="1.5"/>
    <circle cx="28" cy="100" r="1.5"/>
    <circle cx="20" cy="108" r="1.5"/>
    <circle cx="100" cy="100" r="1.5"/>
    <circle cx="108" cy="100" r="1.5"/>
    <circle cx="108" cy="108" r="1.5"/>
  </g>

  <!-- Scroll shape -->
  <g filter="url(#shadow)">
    <!-- Scroll body -->
    <rect x="34" y="44" width="60" height="52" rx="2" fill="url(#scroll-grad)" opacity="0.88"/>

    <!-- Top roll -->
    <ellipse cx="64" cy="44" rx="34" ry="8" fill="#ffffff" opacity="0.9"/>
    <ellipse cx="64" cy="44" rx="34" ry="8" fill="none" stroke="#047857" stroke-width="0.5" opacity="0.15"/>
    <ellipse cx="64" cy="46" rx="30" ry="4" fill="#047857" opacity="0.08"/>
    <path d="M30 44 Q30 38 34 36 Q38 34 64 36 Q90 34 94 36 Q98 38 98 44"
          fill="#ffffff" opacity="0.5"/>

    <!-- Bottom roll -->
    <ellipse cx="64" cy="96" rx="34" ry="8" fill="#ffffff" opacity="0.85"/>
    <ellipse cx="64" cy="96" rx="34" ry="8" fill="none" stroke="#047857" stroke-width="0.5" opacity="0.15"/>
    <path d="M30 96 Q30 102 34 104 Q38 106 64 104 Q90 106 94 104 Q98 102 98 96"
          fill="#ffffff" opacity="0.4"/>

    <!-- Text lines on scroll -->
    <g opacity="0.2" fill="#047857">
      <rect x="42" y="54" width="44" height="2" rx="1"/>
      <rect x="42" y="60" width="38" height="2" rx="1"/>
      <rect x="42" y="66" width="42" height="2" rx="1"/>
      <rect x="42" y="72" width="34" height="2" rx="1"/>
      <rect x="42" y="78" width="40" height="2" rx="1"/>
      <rect x="42" y="84" width="28" height="2" rx="1"/>
    </g>
  </g>

  <!-- Floating </> code brackets above scroll -->
  <g filter="url(#magic-glow)">
    <text x="36" y="32" font-family="monospace, Courier" font-size="22" font-weight="bold" fill="url(#bracket-glow)" opacity="0.95">&lt;</text>
    <text x="52" y="30" font-family="monospace, Courier" font-size="18" font-weight="bold" fill="#ffffff" opacity="0.7">/</text>
    <text x="64" y="32" font-family="monospace, Courier" font-size="22" font-weight="bold" fill="url(#bracket-glow)" opacity="0.95">&gt;</text>
  </g>

  <!-- Cursor/caret -->
  <g filter="url(#glow)">
    <rect x="88" y="20" width="2" height="14" rx="1" fill="#ffffff" opacity="0.7"/>
  </g>

  <!-- Magic sparkles around brackets -->
  <g fill="#ffffff" filter="url(#glow)">
    <path d="M30 18 L31 20.5 L30 23 L29 20.5 Z" opacity="0.6"/>
    <path d="M30 18 L32.5 19 L30 20.5 L27.5 19 Z" opacity="0.6"/>
    <path d="M96 12 L96.8 14 L96 16 L95.2 14 Z" opacity="0.5"/>
    <path d="M96 12 L98 12.8 L96 14 L94 12.8 Z" opacity="0.5"/>
    <path d="M80 24 L80.6 25.5 L80 27 L79.4 25.5 Z" opacity="0.4"/>
    <path d="M80 24 L81.5 24.6 L80 25.5 L78.5 24.6 Z" opacity="0.4"/>
    <circle cx="44" cy="14" r="1" opacity="0.35"/>
    <circle cx="74" cy="16" r="0.8" opacity="0.3"/>
    <circle cx="104" cy="22" r="1.2" opacity="0.25"/>
  </g>

  <!-- Magic trail from brackets to scroll -->
  <g stroke="#ffffff" stroke-width="0.8" fill="none" opacity="0.15">
    <path d="M40 34 Q44 38 44 44" stroke-dasharray="2 2"/>
    <path d="M78 34 Q76 38 74 44" stroke-dasharray="2 2"/>
    <path d="M56 32 Q58 36 58 44" stroke-dasharray="2 2"/>
  </g>
</svg>